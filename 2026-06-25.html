function dot(score) {
  const n = Number(score) || 0;
  if (n >= 7) return '<span class="score-dot dot-hi"></span>';
  if (n >= 4) return '<span class="score-dot dot-md"></span>';
  return '<span class="score-dot dot-lo"></span>';
}

function render() {
  // Stats
  const cats = {};
  DATA.articles.forEach(a => {
    const c = a.category || 'other';
    cats[c] = (cats[c] || 0) + 1;
  });
  document.getElementById('stats').innerHTML = Object.entries(cats)

  document.getElementById('articles').innerHTML = DATA.articles.map((a, i) => {

      'Frontend': 'tag-fe',
      'Fullstack': 'tag-fe',
      'C/C++': 'tag-cpp',

    const catLabel = {

      'Frontend': '前端',
      'Fullstack': '全栈',
      'C/C++': 'C/C++',
    }[a.category] || a.category;

    const signals = [];
    if (a.points) signals.push(`👍 ${a.points}`);
    if (a.comments) signals.push(`💬 ${a.comments}`);

    const scores = [];
    if (a.scores) {
